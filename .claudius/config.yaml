# Claudius Configuration
configVersion: 3

engage: terminal # terminal | chat-sdk
deploy: none # vercel | fly | none

commands:
  test: bun test
  lint: bun run lint
  build: bun run build

workflow:
  defaultBranch: main
  squashMerge: true

autonomy:
  budgetCapUsd: 50
  autoMerge: false
  maxTeamSize: 3

jobs:
  enabled: false
  dir: .claudius/jobs

slack:
  channel: ""

owner:
  name: ""
  slackUserId: ""
  timezone: Asia/Bangkok

goals: []
daemon:
  enabled: false
  intervalMinutes: 15
  budgetCapUsd: 50
  maxIssuesPerDay: 5
  requireApprovalFor: [ merge, deploy ]
  pauseOnFailure: true
  maxConsecutiveFailures: 3
  ideation:
    maxCandidates: 10
    maxToCreate: 3
    autoExecuteLabels: [ bug, chore, test ]
    requireApprovalLabels: [ feat ]
    discussionCategory: Ideas
  timezone: Asia/Bangkok
  activeHours:
    start: 09:00
    end: 22:00
studio:
  enabled: true
  slimEnabled: true
  port: 0
